name: PHP CS Fixer Reusable Workflow

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        type: string
        default: '8.4'
      ci-directory:
        description: 'Path to the CI directory (containing composer.json and the fixer config)'
        type: string
        default: '.github/ci/phpcsfixer'
      paths:
        description: >
          YAML filter spec for dorny/paths-filter.
          Must define two keys: "ci" (the CI config files) and "files" (all files that should
          trigger the check). The "ci" key controls whether the base-branch CI directory is
          fetched; "files" controls whether the expensive steps run at all.
        type: string
        required: true

jobs:
  phpcsfixer:
    name: PHP ${{ inputs.php-version }}

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine if workflow should run based on files changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ inputs.paths }}

      - name: Get latest CI code from target
        if: steps.changes.outputs.ci != 'true' && github.base_ref
        env:
          REF: ${{ github.base_ref }}
        run: |
          echo "Using CI code from $REF"
          git fetch origin "$REF"
          git checkout origin/"$REF" -- ${{ inputs.ci-directory }}

      - name: Setup PHP
        if: steps.changes.outputs.files == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl

      - name: Install Composer dependencies
        if: steps.changes.outputs.files == 'true'
        uses: ramsey/composer-install@v3
        with:
          composer-options: ${{ matrix.php == '8.6' && '--ignore-platform-req=php+' || '' }} --prefer-dist --no-progress
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Install PHP CS Fixer Composer dependencies
        if: steps.changes.outputs.files == 'true'
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-progress
          custom-cache-suffix: $(date -u "+%Y-%m")
          working-directory: ${{ inputs.ci-directory }}

      - name: Run PHP CS Fixer
        if: steps.changes.outputs.files == 'true'
        id: phpcsfixer
        run: composer phpcsfixer-check

      - name: Report failure in PR comment
        if: failure() && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "PHP CS Fixer failed. Please run \`composer phpcsfixer\` locally and commit the changes."